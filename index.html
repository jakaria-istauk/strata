<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Strata — Explorer</title>
<script>
  // Apply theme before first paint (no flash). mode: 'light' | 'dark' | 'system'
  (function () {
    var mode = localStorage.getItem('strata-theme') || 'system';
    var dark = mode === 'dark' || (mode === 'system' &&
      window.matchMedia('(prefers-color-scheme: dark)').matches);
    document.documentElement.classList.toggle('dark', dark);
  })();
</script>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Geist:wght@500;600;700;800&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="assets/strata.css" rel="stylesheet"/>
<script id="tailwind-config">
  var c = (v) => `rgb(var(--${v}) / <alpha-value>)`;
  tailwind.config = {
    darkMode: "class",
    theme: { extend: {
      colors: {
        "primary": c('primary'), "on-primary": c('on-primary'),
        "primary-container": c('primary-container'), "on-primary-container": c('on-primary-container'),
        "secondary": c('secondary'), "secondary-container": c('secondary-container'), "on-secondary-container": c('on-secondary-container'),
        "tertiary": c('tertiary'), "error": c('error'),
        "background": c('background'), "on-background": c('on-background'),
        "surface": c('surface'), "on-surface": c('on-surface'), "on-surface-variant": c('on-surface-variant'),
        "surface-dim": c('surface-dim'), "surface-bright": c('surface-bright'),
        "surface-container-lowest": c('surface-container-lowest'), "surface-container-low": c('surface-container-low'),
        "surface-container": c('surface-container'), "surface-container-high": c('surface-container-high'),
        "surface-container-highest": c('surface-container-highest'), "surface-variant": c('surface-variant'),
        "outline": c('outline'), "outline-variant": c('outline-variant')
      },
      borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
      spacing: { "base": "4px", "xs": "4px", "sm": "8px", "md": "16px", "lg": "24px", "xl": "48px" },
      fontFamily: { "display": ["Geist"], "body": ["Inter"], "mono": ["JetBrains Mono"] }
    }}
  }
</script>
</head>
<body class="font-body text-sm">

<!-- Sidebar -->
<aside class="flex flex-col h-screen fixed left-0 top-0 pt-xl px-sm pb-md bg-surface border-r border-outline-variant w-[260px] z-40">
  <div class="mb-lg px-md">
    <h1 class="font-display text-lg font-bold text-primary">Strata</h1>
    <p class="text-on-surface-variant text-xs mt-xs opacity-60">v0.1.0 · MySQL Admin</p>
  </div>

  <div class="px-sm mb-sm">
    <label class="text-xs text-on-surface-variant opacity-60 uppercase tracking-wider px-sm">Database</label>
    <select id="dbSelect" class="mt-xs w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-sm py-sm text-on-surface focus:ring-primary focus:border-primary"></select>
  </div>

  <div class="px-sm mb-xs flex items-center justify-between">
    <span class="text-xs text-on-surface-variant opacity-60 uppercase tracking-wider px-sm">Tables</span>
    <span id="tableCount" class="text-xs text-on-surface-variant opacity-40 px-sm"></span>
  </div>
  <div class="px-sm mb-sm">
    <input id="tableFilter" type="text" placeholder="Filter tables…" class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-sm py-xs text-xs text-on-surface focus:ring-primary focus:border-primary"/>
  </div>
  <nav id="tableList" class="flex-1 overflow-auto scroll space-y-[2px] px-xs"></nav>

  <div class="mt-auto border-t border-outline-variant pt-md px-sm">
    <a class="flex items-center gap-md px-md py-sm text-on-surface-variant hover:text-on-surface hover:bg-surface-container-low transition-all rounded-lg" href="#">
      <span class="material-symbols-outlined text-[20px]">description</span> Docs
    </a>
  </div>
</aside>

<!-- Main -->
<main class="ml-[260px] flex flex-col h-screen relative">
  <!-- Top bar -->
  <header class="flex justify-between items-center w-full px-md h-[56px] sticky top-0 z-50 bg-surface-container border-b border-outline-variant">
    <nav class="flex gap-lg items-center">
      <span class="font-display text-lg font-bold text-on-surface">Strata</span>
      <div class="hidden md:flex items-center gap-md border-l border-outline-variant pl-lg ml-sm">
        <span class="text-primary font-bold border-b-2 border-primary py-sm cursor-pointer">Data Browser</span>
        <span class="text-on-surface-variant font-medium hover:bg-surface-container-high transition-colors px-sm py-xs rounded cursor-pointer opacity-50">Query Runner</span>
        <span class="text-on-surface-variant font-medium hover:bg-surface-container-high transition-colors px-sm py-xs rounded cursor-pointer opacity-50">Visualizer</span>
      </div>
    </nav>
    <div class="flex items-center gap-md">
      <div class="bg-surface-container-lowest border border-outline-variant rounded-full flex items-center px-sm py-1 gap-sm">
        <span class="material-symbols-outlined text-base text-on-surface-variant">search</span>
        <input id="rowSearch" class="bg-transparent border-none text-sm focus:ring-0 w-56 text-on-surface" placeholder="Search rows in table…" type="text"/>
      </div>
      <div class="theme-seg flex items-center bg-surface-container-lowest border border-outline-variant rounded-full p-[2px]" role="group" aria-label="Theme">
        <button data-mode="light" class="flex items-center justify-center w-7 h-7 rounded-full transition-colors" title="Light"><span class="material-symbols-outlined text-[18px]">light_mode</span></button>
        <button data-mode="dark" class="flex items-center justify-center w-7 h-7 rounded-full transition-colors" title="Dark"><span class="material-symbols-outlined text-[18px]">dark_mode</span></button>
        <button data-mode="system" class="flex items-center justify-center w-7 h-7 rounded-full transition-colors" title="System"><span class="material-symbols-outlined text-[18px]">desktop_windows</span></button>
      </div>
      <div class="w-8 h-8 rounded-full bg-primary-container flex items-center justify-center text-on-primary-container font-bold text-xs">JS</div>
    </div>
  </header>

  <!-- Content -->
  <div class="flex-1 flex flex-col overflow-hidden p-md gap-md">
    <!-- Context header + toolbar -->
    <div class="flex flex-col gap-sm">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-sm">
          <span class="material-symbols-outlined text-primary">table_rows</span>
          <h2 id="ctxTable" class="font-display text-lg font-bold text-on-surface">—</h2>
          <span id="ctxSchema" class="px-sm py-[2px] rounded bg-secondary-container text-on-secondary-container text-[11px] font-mono tracking-wider"></span>
          <span id="ctxRows" class="text-on-surface-variant text-sm opacity-60 ml-sm"></span>
        </div>
      </div>
      <div class="glass-panel p-sm rounded-lg flex items-center justify-between gap-md">
        <div class="flex items-center gap-sm">
          <button id="btnRefresh" class="flex items-center gap-sm px-sm py-sm rounded border border-outline-variant hover:bg-surface-container-high transition-colors text-[13px]">
            <span class="material-symbols-outlined text-[18px]">refresh</span> Refresh
          </button>
          <button id="btnExport" class="flex items-center gap-sm px-sm py-sm rounded border border-outline-variant hover:bg-surface-container-high transition-colors text-[13px]">
            <span class="material-symbols-outlined text-[18px]">download</span> Export CSV
          </button>
        </div>
        <div class="flex items-center gap-md">
          <div class="flex items-center gap-sm text-sm text-on-surface-variant">
            <span>Rows per page:</span>
            <select id="perPage" class="bg-surface-container-lowest border border-outline-variant rounded px-sm py-xs text-xs focus:ring-primary focus:border-primary">
              <option>50</option><option>100</option><option>500</option>
            </select>
          </div>
          <div class="flex items-center gap-sm">
            <span id="pageInfo" class="text-sm text-on-surface-variant">—</span>
            <div class="flex border border-outline-variant rounded overflow-hidden">
              <button id="prevPage" class="p-xs hover:bg-surface-container-high border-r border-outline-variant material-symbols-outlined text-[18px]">chevron_left</button>
              <button id="nextPage" class="p-xs hover:bg-surface-container-high material-symbols-outlined text-[18px]">chevron_right</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Data grid -->
    <div class="flex-1 glass-panel rounded-xl overflow-hidden flex flex-col">
      <div id="gridWrap" class="scroll flex-1 overflow-auto">
        <table class="w-full text-left border-collapse min-w-[800px]">
          <thead id="gridHead" class="sticky top-0 z-20"></thead>
          <tbody id="gridBody" class="font-mono text-sm"></tbody>
        </table>
        <div id="gridMsg" class="hidden p-xl text-center text-on-surface-variant opacity-60"></div>
      </div>
    </div>

    <!-- Footer -->
    <footer class="flex items-center justify-between text-sm text-on-surface-variant opacity-60 font-mono">
      <div class="flex items-center gap-lg">
        <span class="flex items-center gap-xs"><span class="w-2 h-2 rounded-full bg-green-500"></span> <span id="connInfo">Connected</span></span>
        <span id="queryTime"></span>
      </div>
      <div class="flex items-center gap-lg"><span>UTF-8 · InnoDB</span></div>
    </footer>
  </div>
</main>

<script src="assets/strata.js" defer></script>
</body>
</html>
