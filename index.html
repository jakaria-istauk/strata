<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Strata — Explorer</title>
<link rel="icon" type="image/png" href="assets/strata-logo.png"/>
<link rel="apple-touch-icon" href="assets/strata-logo.png"/>
<script>
  // Apply theme before first paint (no flash). mode: 'light' | 'dark' | 'system'
  (function () {
    var mode = localStorage.getItem('strata-theme') || 'system';
    var dark = mode === 'dark' || (mode === 'system' &&
      window.matchMedia('(prefers-color-scheme: dark)').matches);
    document.documentElement.classList.toggle('dark', dark);
  })();
</script>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Geist:wght@500;600;700;800&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="assets/strata.css" rel="stylesheet"/>
<script id="tailwind-config">
  var c = (v) => `rgb(var(--${v}) / <alpha-value>)`;
  tailwind.config = {
    darkMode: "class",
    theme: { extend: {
      colors: {
        "primary": c('primary'), "on-primary": c('on-primary'),
        "primary-container": c('primary-container'), "on-primary-container": c('on-primary-container'),
        "secondary": c('secondary'), "secondary-container": c('secondary-container'), "on-secondary-container": c('on-secondary-container'),
        "tertiary": c('tertiary'), "error": c('error'),
        "background": c('background'), "on-background": c('on-background'),
        "surface": c('surface'), "on-surface": c('on-surface'), "on-surface-variant": c('on-surface-variant'),
        "surface-dim": c('surface-dim'), "surface-bright": c('surface-bright'),
        "surface-container-lowest": c('surface-container-lowest'), "surface-container-low": c('surface-container-low'),
        "surface-container": c('surface-container'), "surface-container-high": c('surface-container-high'),
        "surface-container-highest": c('surface-container-highest'), "surface-variant": c('surface-variant'),
        "outline": c('outline'), "outline-variant": c('outline-variant')
      },
      borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
      spacing: { "base": "4px", "xs": "4px", "sm": "8px", "md": "16px", "lg": "24px", "xl": "48px" },
      fontFamily: { "display": ["Geist"], "body": ["Inter"], "mono": ["JetBrains Mono"] }
    }}
  }
</script>
</head>
<body class="font-body text-sm">

<!-- Sidebar -->
<aside class="flex flex-col h-screen fixed left-0 top-0 pt-xl px-sm pb-md bg-surface border-r border-outline-variant w-[260px] z-40">
  <div class="mb-lg px-md flex items-center gap-sm">
    <img src="assets/strata-logo.png" alt="Strata" class="w-9 h-9 shrink-0"/>
    <div>
      <h1 class="font-display text-lg font-bold text-primary leading-none">Strata</h1>
      <p class="text-on-surface-variant text-xs mt-xs opacity-60">v0.1.0 · MySQL Admin</p>
    </div>
  </div>

  <div class="px-sm mb-sm">
    <label class="text-xs text-on-surface-variant opacity-60 uppercase tracking-wider px-sm">Connection</label>
    <div class="mt-xs flex items-center gap-xs">
      <select id="profileSelect" class="flex-1 min-w-0 bg-surface-container-lowest border border-outline-variant rounded-lg px-sm py-sm text-on-surface focus:ring-primary focus:border-primary"></select>
      <button id="btnConnections" title="Manage connections" class="shrink-0 flex items-center justify-center w-9 h-9 rounded-lg border border-outline-variant hover:bg-surface-container-high transition-colors text-on-surface-variant">
        <span class="material-symbols-outlined text-[20px]">settings</span>
      </button>
    </div>
  </div>

  <div class="px-sm mb-sm">
    <label class="text-xs text-on-surface-variant opacity-60 uppercase tracking-wider px-sm">Database</label>
    <select id="dbSelect" class="mt-xs w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-sm py-sm text-on-surface focus:ring-primary focus:border-primary"></select>
  </div>

  <div class="px-sm mb-xs flex items-center justify-between">
    <span class="text-xs text-on-surface-variant opacity-60 uppercase tracking-wider px-sm">Tables</span>
    <span id="tableCount" class="text-xs text-on-surface-variant opacity-40 px-sm"></span>
  </div>
  <div class="px-sm mb-sm">
    <input id="tableFilter" type="text" placeholder="Filter tables…" class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-sm py-xs text-xs text-on-surface focus:ring-primary focus:border-primary"/>
  </div>
  <nav id="tableList" class="flex-1 overflow-auto scroll space-y-[2px] px-xs"></nav>

  <div class="mt-auto border-t border-outline-variant pt-md px-sm">
    <a class="flex items-center gap-md px-md py-sm text-on-surface-variant hover:text-on-surface hover:bg-surface-container-low transition-all rounded-lg" href="#">
      <span class="material-symbols-outlined text-[20px]">description</span> Docs
    </a>
  </div>
</aside>

<!-- Main -->
<main class="ml-[260px] flex flex-col h-screen relative">
  <!-- Top bar -->
  <header class="flex justify-between items-center w-full px-md h-[56px] sticky top-0 z-50 bg-surface-container border-b border-outline-variant">
    <nav class="flex gap-lg items-center">
      <span class="flex items-center gap-sm font-display text-lg font-bold text-on-surface"><img src="assets/strata-logo.png" alt="" class="w-6 h-6"/>Strata</span>
      <div class="hidden md:flex items-center gap-md border-l border-outline-variant pl-lg ml-sm">
        <span data-view="browser" class="navtab text-primary font-bold border-b-2 border-primary py-sm cursor-pointer">Data Browser</span>
        <span data-view="query" class="navtab text-on-surface-variant font-medium hover:bg-surface-container-high transition-colors px-sm py-xs rounded cursor-pointer">Query Runner</span>
        <span data-view="dashboard" class="navtab text-on-surface-variant font-medium hover:bg-surface-container-high transition-colors px-sm py-xs rounded cursor-pointer">Dashboard</span>
      </div>
    </nav>
    <div class="flex items-center gap-md">
      <div class="bg-surface-container-lowest border border-outline-variant rounded-full flex items-center px-sm py-1 gap-sm">
        <span class="material-symbols-outlined text-base text-on-surface-variant">search</span>
        <input id="rowSearch" class="bg-transparent border-none text-sm focus:ring-0 w-56 text-on-surface" placeholder="Search rows in table…" type="text"/>
      </div>
      <div class="theme-seg flex items-center bg-surface-container-lowest border border-outline-variant rounded-full p-[2px]" role="group" aria-label="Theme">
        <button data-mode="light" class="flex items-center justify-center w-7 h-7 rounded-full transition-colors" title="Light"><span class="material-symbols-outlined text-[18px]">light_mode</span></button>
        <button data-mode="dark" class="flex items-center justify-center w-7 h-7 rounded-full transition-colors" title="Dark"><span class="material-symbols-outlined text-[18px]">dark_mode</span></button>
        <button data-mode="system" class="flex items-center justify-center w-7 h-7 rounded-full transition-colors" title="System"><span class="material-symbols-outlined text-[18px]">desktop_windows</span></button>
      </div>
      <div class="w-8 h-8 rounded-full bg-primary-container flex items-center justify-center text-on-primary-container font-bold text-xs">JS</div>
    </div>
  </header>

  <!-- Content: Data Browser -->
  <div id="viewBrowser" class="flex-1 flex flex-col overflow-hidden p-md gap-md">
    <!-- Context header + toolbar -->
    <div class="flex flex-col gap-sm">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-sm">
          <span class="material-symbols-outlined text-primary">table_rows</span>
          <h2 id="ctxTable" class="font-display text-lg font-bold text-on-surface">—</h2>
          <span id="ctxSchema" class="px-sm py-[2px] rounded bg-secondary-container text-on-secondary-container text-[11px] font-mono tracking-wider"></span>
          <span id="ctxRows" class="text-on-surface-variant text-sm opacity-60 ml-sm"></span>
        </div>
      </div>
      <div class="glass-panel p-sm rounded-lg flex items-center justify-between gap-md">
        <div class="flex items-center gap-sm">
          <button id="btnNewRow" class="flex items-center gap-sm px-sm py-sm rounded bg-primary text-on-primary font-semibold hover:opacity-90 transition-opacity text-[13px]">
            <span class="material-symbols-outlined text-[18px]">add</span> New row
          </button>
          <button id="btnRefresh" class="flex items-center gap-sm px-sm py-sm rounded border border-outline-variant hover:bg-surface-container-high transition-colors text-[13px]">
            <span class="material-symbols-outlined text-[18px]">refresh</span> Refresh
          </button>
          <button id="btnExport" class="flex items-center gap-sm px-sm py-sm rounded border border-outline-variant hover:bg-surface-container-high transition-colors text-[13px]">
            <span class="material-symbols-outlined text-[18px]">download</span> Export CSV
          </button>
          <div class="relative">
            <button id="btnColumns" class="flex items-center gap-sm px-sm py-sm rounded border border-outline-variant hover:bg-surface-container-high transition-colors text-[13px]">
              <span class="material-symbols-outlined text-[18px]">view_column</span> Columns
            </button>
            <div id="colMenu" class="hidden absolute z-30 mt-xs left-0 w-56 max-h-[300px] overflow-auto scroll glass-panel rounded-lg p-xs shadow-2xl"></div>
          </div>
          <div id="bulkBar" class="hidden items-center gap-sm pl-sm ml-xs border-l border-outline-variant">
            <span id="bulkCount" class="text-[13px] text-on-surface-variant"></span>
            <button id="btnBulkDelete" class="flex items-center gap-sm px-sm py-sm rounded border border-error/50 text-error hover:bg-error/10 transition-colors text-[13px]">
              <span class="material-symbols-outlined text-[18px]">delete</span> Delete selected
            </button>
          </div>
        </div>
        <div class="flex items-center gap-md">
          <div class="flex items-center gap-sm text-sm text-on-surface-variant">
            <span>Rows per page:</span>
            <select id="perPage" class="bg-surface-container-lowest border border-outline-variant rounded px-sm py-xs text-xs focus:ring-primary focus:border-primary">
              <option>50</option><option>100</option><option>500</option>
            </select>
          </div>
          <div class="flex items-center gap-sm">
            <span id="pageInfo" class="text-sm text-on-surface-variant">—</span>
            <div class="flex border border-outline-variant rounded overflow-hidden">
              <button id="prevPage" class="p-xs hover:bg-surface-container-high border-r border-outline-variant material-symbols-outlined text-[18px]">chevron_left</button>
              <button id="nextPage" class="p-xs hover:bg-surface-container-high material-symbols-outlined text-[18px]">chevron_right</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Data grid -->
    <div class="flex-1 glass-panel rounded-xl overflow-hidden flex flex-col">
      <div id="gridWrap" class="scroll flex-1 overflow-auto">
        <table class="w-full text-left border-collapse min-w-[800px]">
          <thead id="gridHead" class="sticky top-0 z-20"></thead>
          <tbody id="gridBody" class="font-mono text-sm"></tbody>
        </table>
        <div id="gridMsg" class="hidden p-xl text-center text-on-surface-variant opacity-60"></div>
      </div>
    </div>

    <!-- Footer -->
    <footer class="flex items-center justify-between text-sm text-on-surface-variant opacity-60 font-mono">
      <div class="flex items-center gap-lg">
        <span class="flex items-center gap-xs"><span class="w-2 h-2 rounded-full bg-green-500"></span> <span id="connInfo">Connected</span></span>
        <span id="queryTime"></span>
      </div>
      <div class="flex items-center gap-lg"><span>UTF-8 · InnoDB</span></div>
    </footer>
  </div>

  <!-- Content: Query Runner -->
  <div id="viewQuery" class="hidden flex-1 flex flex-col overflow-hidden p-md gap-md">
    <!-- query tabs -->
    <div class="flex items-center gap-xs">
      <div id="queryTabs" class="flex items-center gap-xs overflow-x-auto scroll"></div>
      <button id="btnNewTab" title="New query tab" class="shrink-0 w-8 h-8 flex items-center justify-center rounded-lg border border-outline-variant hover:bg-surface-container-high text-on-surface-variant"><span class="material-symbols-outlined text-[18px]">add</span></button>
    </div>

    <!-- editor + toolbar -->
    <div class="glass-panel rounded-xl flex flex-col">
      <textarea id="sqlEditor" spellcheck="false" placeholder="SELECT * FROM …    (⌘/Ctrl+Enter to run)"
        class="w-full bg-transparent resize-y px-md py-sm font-mono text-[13px] text-on-surface focus:ring-0 focus:outline-none border-none min-h-[140px]"></textarea>
      <div class="flex items-center justify-between gap-md px-sm py-sm border-t border-outline-variant">
        <div class="flex items-center gap-sm">
          <button id="btnRun" class="flex items-center gap-sm px-md py-sm rounded-lg bg-primary text-on-primary font-semibold hover:opacity-90 transition-opacity text-[13px]">
            <span class="material-symbols-outlined text-[18px]">play_arrow</span> Run
          </button>
          <button id="btnExplain" class="flex items-center gap-sm px-sm py-sm rounded-lg border border-outline-variant hover:bg-surface-container-high transition-colors text-[13px]">
            <span class="material-symbols-outlined text-[18px]">query_stats</span> Explain
          </button>
          <button id="btnHistory" class="flex items-center gap-sm px-sm py-sm rounded-lg border border-outline-variant hover:bg-surface-container-high transition-colors text-[13px]">
            <span class="material-symbols-outlined text-[18px]">history</span> History
          </button>
        </div>
        <div class="flex items-center gap-md text-sm text-on-surface-variant">
          <span class="font-mono">DB: <span id="qDbName" class="text-on-surface">—</span></span>
          <span id="qMeta" class="font-mono"></span>
        </div>
      </div>
    </div>

    <!-- history dropdown -->
    <div id="historyPanel" class="hidden glass-panel rounded-xl p-sm max-h-[200px] overflow-auto scroll"></div>

    <!-- results -->
    <div class="flex-1 glass-panel rounded-xl overflow-hidden flex flex-col">
      <div id="qResultWrap" class="scroll flex-1 overflow-auto">
        <table class="w-full text-left border-collapse min-w-[600px]">
          <thead id="qHead" class="sticky top-0 z-20"></thead>
          <tbody id="qBody" class="font-mono text-sm"></tbody>
        </table>
        <div id="qMsg" class="p-xl text-center text-on-surface-variant opacity-60">Run a query to see results.</div>
      </div>
    </div>
  </div>

  <!-- Content: Dashboard -->
  <div id="viewDashboard" class="hidden flex-1 flex flex-col overflow-auto scroll p-md gap-md">
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-sm">
        <span class="material-symbols-outlined text-primary">monitoring</span>
        <h2 class="font-display text-lg font-bold text-on-surface">Server Dashboard</h2>
        <span id="dashServer" class="px-sm py-[2px] rounded bg-secondary-container text-on-secondary-container text-[11px] font-mono tracking-wider"></span>
      </div>
      <button id="btnRefreshStats" class="flex items-center gap-sm px-sm py-sm rounded border border-outline-variant hover:bg-surface-container-high transition-colors text-[13px]">
        <span class="material-symbols-outlined text-[18px]">refresh</span> Refresh
      </button>
    </div>
    <div id="statCards" class="grid grid-cols-2 md:grid-cols-4 gap-md"></div>
    <div class="glass-panel rounded-xl p-lg">
      <h3 class="font-display font-bold text-on-surface mb-md">Query breakdown <span class="text-on-surface-variant opacity-60 text-sm font-body">(since server start)</span></h3>
      <div id="breakdownChart" class="space-y-sm"></div>
    </div>
  </div>
</main>

<!-- Row detail / edit drawer -->
<div id="rowDrawer" class="hidden fixed inset-0 z-[90]">
  <div id="rowDrawerScrim" class="absolute inset-0 bg-black/50 backdrop-blur-sm"></div>
  <div class="absolute right-0 top-0 h-full w-full max-w-[520px] bg-surface-container border-l border-outline-variant shadow-2xl flex flex-col">
    <div class="flex items-center justify-between px-lg py-md border-b border-outline-variant">
      <div class="flex items-center gap-sm min-w-0">
        <span class="material-symbols-outlined text-primary">table_rows</span>
        <h2 id="drawerTitle" class="font-display text-lg font-bold text-on-surface truncate">Row</h2>
        <span id="drawerMode" class="px-sm py-[2px] rounded bg-secondary-container text-on-secondary-container text-[11px] font-mono tracking-wider"></span>
      </div>
      <button id="drawerClose" class="flex items-center justify-center w-8 h-8 rounded-lg hover:bg-surface-container-high text-on-surface-variant"><span class="material-symbols-outlined text-[20px]">close</span></button>
    </div>
    <div id="drawerBody" class="flex-1 overflow-auto scroll p-lg space-y-md"></div>
    <div id="drawerMsg" class="hidden mx-lg mb-sm text-sm rounded-lg px-sm py-sm"></div>
    <div class="flex items-center justify-between px-lg py-md border-t border-outline-variant">
      <button id="drawerDelete" class="flex items-center gap-sm px-md py-sm rounded-lg border border-error/50 text-error hover:bg-error/10 transition-colors">
        <span class="material-symbols-outlined text-[18px]">delete</span> Delete
      </button>
      <div class="flex items-center gap-sm">
        <button id="drawerCancel" class="px-md py-sm rounded-lg hover:bg-surface-container-high text-on-surface-variant">Cancel</button>
        <button id="drawerEdit" class="px-md py-sm rounded-lg border border-outline-variant hover:bg-surface-container-high text-on-surface">Edit</button>
        <button id="drawerSave" class="hidden px-md py-sm rounded-lg bg-primary text-on-primary font-semibold hover:opacity-90 transition-opacity">Save</button>
      </div>
    </div>
  </div>
</div>

<!-- Connections modal -->
<div id="connModal" class="hidden fixed inset-0 z-[100] bg-black/50 backdrop-blur-sm flex items-center justify-center p-md">
  <div class="bg-surface-container border border-outline-variant rounded-xl w-full max-w-[680px] max-h-[88vh] flex flex-col shadow-2xl">
    <div class="flex items-center justify-between px-lg py-md border-b border-outline-variant">
      <h2 id="connModalTitle" class="font-display text-lg font-bold text-on-surface">Connections</h2>
      <button id="connClose" class="flex items-center justify-center w-8 h-8 rounded-lg hover:bg-surface-container-high text-on-surface-variant"><span class="material-symbols-outlined text-[20px]">close</span></button>
    </div>
    <div class="flex-1 overflow-auto scroll p-lg">
      <!-- list view -->
      <div id="connList">
        <div id="profileList" class="space-y-sm mb-md"></div>
        <button id="btnNewProfile" class="flex items-center gap-sm px-md py-sm rounded-lg border border-dashed border-outline-variant hover:bg-surface-container-high transition-colors text-on-surface-variant w-full justify-center">
          <span class="material-symbols-outlined text-[20px]">add</span> New connection
        </button>
      </div>
      <!-- form view -->
      <form id="connForm" class="hidden space-y-md">
        <div>
          <label class="block text-xs uppercase tracking-wider text-on-surface-variant opacity-70 mb-xs">Profile name</label>
          <input name="name" required placeholder="e.g. Local Herd" class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-sm py-sm text-on-surface focus:ring-primary focus:border-primary"/>
        </div>
        <div class="grid grid-cols-3 gap-md">
          <div class="col-span-2">
            <label class="block text-xs uppercase tracking-wider text-on-surface-variant opacity-70 mb-xs">Host</label>
            <input name="host" required value="127.0.0.1" class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-sm py-sm text-on-surface focus:ring-primary focus:border-primary"/>
          </div>
          <div>
            <label class="block text-xs uppercase tracking-wider text-on-surface-variant opacity-70 mb-xs">Port</label>
            <input name="port" type="number" value="3306" class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-sm py-sm text-on-surface focus:ring-primary focus:border-primary"/>
          </div>
        </div>
        <div class="grid grid-cols-2 gap-md">
          <div>
            <label class="block text-xs uppercase tracking-wider text-on-surface-variant opacity-70 mb-xs">User</label>
            <input name="user" required value="root" class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-sm py-sm text-on-surface focus:ring-primary focus:border-primary"/>
          </div>
          <div>
            <label class="block text-xs uppercase tracking-wider text-on-surface-variant opacity-70 mb-xs">Password</label>
            <input name="pass" type="password" autocomplete="off" class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-sm py-sm text-on-surface focus:ring-primary focus:border-primary"/>
          </div>
        </div>
        <div>
          <label class="block text-xs uppercase tracking-wider text-on-surface-variant opacity-70 mb-xs">Default database <span class="opacity-50 normal-case">(optional)</span></label>
          <input name="db" placeholder="leave blank to pick after connecting" class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-sm py-sm text-on-surface focus:ring-primary focus:border-primary"/>
        </div>
        <label class="flex items-center gap-sm text-on-surface-variant cursor-pointer">
          <input name="remember" type="checkbox" checked class="rounded border-outline-variant text-primary focus:ring-primary"/>
          <span>Remember password <span class="opacity-50 text-xs">(stored in this browser; otherwise asked each session)</span></span>
        </label>
        <div id="connTestMsg" class="hidden text-sm rounded-lg px-sm py-sm"></div>
        <div class="flex items-center justify-between pt-sm">
          <button type="button" id="btnTest" class="flex items-center gap-sm px-md py-sm rounded-lg border border-outline-variant hover:bg-surface-container-high transition-colors text-on-surface">
            <span class="material-symbols-outlined text-[18px]">bolt</span> Test connection
          </button>
          <div class="flex items-center gap-sm">
            <button type="button" id="btnCancelForm" class="px-md py-sm rounded-lg hover:bg-surface-container-high text-on-surface-variant">Cancel</button>
            <button type="submit" class="px-md py-sm rounded-lg bg-primary text-on-primary font-semibold hover:opacity-90 transition-opacity">Save</button>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="assets/strata.js" defer></script>
</body>
</html>
