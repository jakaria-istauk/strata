<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Strata — MySQL Admin</title>
<link rel="icon" type="image/png" href="/assets/strata-logo.png" />
<link rel="apple-touch-icon" href="/assets/strata-logo.png" />
<script>
  // Apply theme before first paint (no flash). mode: 'light' | 'dark' | 'system'
  (function () {
    var mode = localStorage.getItem('strata-theme') || 'system';
    var dark = mode === 'dark' || (mode === 'system' &&
      window.matchMedia('(prefers-color-scheme: dark)').matches);
    document.documentElement.classList.toggle('dark', dark);
  })();
</script>
</head>
<body class="font-body text-sm">
<div id="root"></div>
<script type="module" src="/src/main.tsx"></script>
</body>
</html>
